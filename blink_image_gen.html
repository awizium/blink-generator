<!DOCTYPE html>
<html lang="ru">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <meta charset="UTF-8">
  <title>Blink Generator</title>
  <style>
    /* =========================================
       CSS Variables — Default theme (Gray)
       ========================================= */
    :root {
      --bg: #1e1e22;
      --bg1: #242428;
      --bg2: #212125;
      --bg3: #2c2c32;
      --bg4: #38383f;
      --border: #303038;
      --border-l: #3a3a44;
      --text: #d0d0d6;
      --text2: #a8a8b2;
      --text3: #747480;
      --text4: #58585f;
      --accent: #5b9ef0;
      --accent2: #4088e0;
      --accent-d: #1a2e4a;
      --green: #4abe6a;
      --green-d: #142e1e;
      --red: #e85454;
      --red-d: #361212;
      --yellow: #d4a824;
      --yellow-d: #30260c;
      --purple: #9878d0;
      --purple-d: #241838;
      --r: 8px;
      --rl: 12px;
      --sh: 0 1px 3px rgba(0, 0, 0, .3);
    }

    /* =========================================
       Theme: White
       ========================================= */
    [data-theme="white"] {
      --bg: #fff;
      --bg1: #fff;
      --bg2: #fafafa;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #e8e8e8;
      --border-l: #ddd;
      --text: #111;
      --text2: #333;
      --text3: #777;
      --text4: #aaa;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accent-d: #dbeafe;
      --green: #16a34a;
      --green-d: #dcfce7;
      --red: #dc2626;
      --red-d: #fee2e2;
      --yellow: #ca8a04;
      --yellow-d: #fefce8;
      --purple: #7c3aed;
      --purple-d: #f3e8ff;
      --sh: 0 1px 3px rgba(0, 0, 0, .04);
    }

    /* =========================================
       Theme: Dark Gray
       ========================================= */
    [data-theme="dgray"] {
      --bg: #0a0a0b;
      --bg1: #111113;
      --bg2: #18181b;

      --accent-d: #1e3a5f;
      --green: #22c55e;
      --green-d: #14532d;
      --red: #ef4444;
      --red-d: #450a0a;
      --yellow: #eab308;
      --yellow-d: #422006;
      --purple: #a855f7;
      --purple-d: #3b0764;
      --sh: 0 1px 4px rgba(0, 0, 0, .3);
    }

    /* =========================================
       Theme: Dark
       ========================================= */
    [data-theme="dark"] {
      --bg: #050506;
      --bg1: #0a0a0c;
      --bg2: #0f0f12;

    /* =========================================
       Theme: Midnight
       ========================================= */
    [data-theme="midnight"] {

    }

    /* =========================================
       Theme: Abyss
       ========================================= */
    [data-theme="abyss"] {
      --bg: #03050a;
      --bg1: #060a14;
      --bg2: #0a0f1e;
      --bg3: #14203a;

    /* =========================================

       ========================================= */
    [data-theme="dracula"] {
      --bg: #181a26;
      --bg1: #21222c;
      --bg2: #282a36;

    /* =========================================

       ========================================= */
    [data-theme="coal"] {
      --bg: #101014;
      --bg1: #16161c;
      --bg2: #1c1c24;

      --bg4: #32323e;

      --text: #ddd;
      --text2: #aaa;
      --text3: #777;
      --text4: #555;
      --accent: #60a5fa;
      --accent2: #3b82f6;
      --accent-d: #1a2e50;
      --green: #34d399;
      --green-d: #0a3020;
      --red: #f87171;
      --red-d: #3a0a0a;
      --yellow: #fbbf24;
      --yellow-d: #3a2a06;
      --purple: #c084fc;
      --purple-d: #2a1040;
      --sh: 0 1px 4px rgba(0, 0, 0, .35);
    }

    /* =========================================
       Theme: Graphite
       ========================================= */
    [data-theme="graphite"] {
      --bg: #141418;
      --bg1: #1a1a20;
      --bg2: #222228;
      --bg3: #2c2c34;
      --bg4: #383842;
      --border: #2a2a32;
      --border-l: #363640;
      --text: #e0e0e0;
      --text2: #b0b0b0;
      --text3: #808080;
      --text4: #5a5a5a;
      --accent: #f97316;
      --accent2: #ea580c;
      --accent-d: #3a1a08;
      --green: #22c55e;
      --green-d: #143020;
      --red: #ef4444;
      --red-d: #3a0a0a;
      --yellow: #eab308;
      --yellow-d: #352008;
      --purple: #a855f7;
      --purple-d: #2a1050;
      --sh: 0 1px 4px rgba(0, 0, 0, .35);
    }

    /* =========================================
       Theme: Forest
       ========================================= */
    [data-theme="forest"] {
      --bg: #060d06;
      --bg1: #0a150a;
      --bg2: #111f11;
      --bg3: #1e351e;
      --bg4: #2a4a2a;
      --border: #1a3a1a;
      --border-l: #2a4a2a;
      --text: #d1fae5;
      --text2: #86efac;
      --text3: #4ade80;
      --text4: #22633a;
      --accent: #22c55e;
      --accent2: #16a34a;
      --accent-d: #052e16;
      --green: #4ade80;
      --green-d: #052e16;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #86efac;
      --purple-d: #052e16;
      --sh: 0 1px 4px rgba(0, 0, 0, .4);
    }

    /* =========================================
       Theme: Rose
       ========================================= */
    [data-theme="rose"] {
      --bg: #0d0608;
      --bg1: #15090d;
      --bg2: #1f1015;
      --bg3: #351a28;
      --bg4: #4a2438;
      --border: #3a1a28;
      --border-l: #4a2a38;
      --text: #fce7f3;
      --text2: #f9a8d4;
      --text3: #ec4899;
      --text4: #7a2050;
      --accent: #f43f5e;
      --accent2: #e11d48;
      --accent-d: #4c0519;
      --green: #fb7185;
      --green-d: #4c0519;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #fda4af;
      --purple-d: #4c0519;
      --sh: 0 1px 4px rgba(0, 0, 0, .4);
    }

    /* =========================================
       Theme: Sunset
       ========================================= */
    [data-theme="sunset"] {
      --bg: #0f0805;
      --bg1: #1a0f08;
      --bg2: #241710;
      --bg3: #3a2518;
      --bg4: #503520;
      --border: #3a2018;
      --border-l: #4a3028;
      --text: #fed7aa;
      --text2: #fdba74;
      --text3: #fb923c;
      --text4: #7c3006;
      --accent: #f97316;
      --accent2: #ea580c;
      --accent-d: #431407;
      --green: #fb923c;
      --green-d: #431407;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #fdba74;
      --purple-d: #431407;

    }

    /* =========================================
       Theme: Ocean
       ========================================= */
    [data-theme="ocean"] {
      --bg: #04100e;
      --bg1: #081a16;
      --bg2: #0e2420;
      --bg3: #18382e;
      --bg4: #224a3e;
      --border: #1a3a2e;
      --border-l: #2a4a3e;
      --text: #ccfbf1;
      --text2: #5eead4;
      --text3: #2dd4bf;
      --text4: #156a5a;
      --accent: #14b8a6;
      --accent2: #0d9488;
      --accent-d: #052e28;
      --green: #2dd4bf;
      --green-d: #052e28;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #5eead4;

    }

    /* =========================================
       Theme: Amethyst
       ========================================= */
    [data-theme="amethyst"] {
      --bg: #0c0812;
      --bg1: #120e1a;
      --bg2: #1a1424;
      --bg3: #281e38;
      --bg4: #362a4a;
      --border: #241a36;
      --border-l: #342a46;
      --text: #ede9fe;
      --text2: #c4b5fd;
      --text3: #a78bfa;
      --text4: #5a3d8a;
      --accent: #8b5cf6;
      --accent2: #7c3aed;
      --accent-d: #1e0a40;
      --green: #a78bfa;
      --green-d: #1e0a40;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #c084fc;
      --purple-d: #2a1050;
      --sh: 0 1px 4px rgba(0, 0, 0, .4);
    }

    /* =========================================
       Base styles
       ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background .3s, color .3s;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg4);
      border-radius: 3px;
    }

    /* =========================================
       Layout
       ========================================= */
    .layout {
      display: flex;
      height: 100vh;
    }

    /* Left panel */
    .lp {
      width: 240px;
      min-width: 160px;
      max-width: 400px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: background .3s;
    }

    /* Right panel */
    .rp {
      width: 255px;
      min-width: 180px;
      max-width: 400px;
      background: var(--bg1);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .3s;
    }

    /* Resize handles */
    .rz {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background .2s;
      flex-shrink: 0;
      z-index: 10;
    }

    .rz:hover,
    .rz.act {
      background: var(--accent);
    }

    /* =========================================
       Left Panel Header
       ========================================= */
    .lp-h {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lp-h-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lp-h h2 {
      font-size: 14px;
      font-weight: 600;
    }

    .lp-h-btns {
      display: flex;
      gap: 3px;
    }

    /* Search in left panel */
    .lp-search {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }

    .lp-search:focus {
      border-color: var(--accent);
    }

    .lp-search::placeholder {
      color: var(--text4);
    }

    /* =========================================
       Chat List
       ========================================= */
    .cl {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    .ci {
      padding: 8px 10px;
      border-radius: var(--r);
      cursor: pointer;
      margin-bottom: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      border: 1px solid transparent;
      transition: all .12s;
    }

    .ci:hover {
      background: var(--bg3);
    }

    .ci.act {
      background: var(--accent-d);
      border-color: var(--accent);
    }

    .ci-i {
      flex: 1;
      min-width: 0;
    }

    .ci-n {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ci-m {
      font-size: 9px;
      color: var(--text4);
      margin-top: 1px;
    }

    .ci-a {
      display: flex;
      gap: 1px;
      opacity: 0;
      transition: opacity .12s;
    }

    .ci:hover .ci-a {
      opacity: 1;
    }

    .cib {
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 3px;
      border-radius: 3px;
    }

    .cib:hover {
      color: var(--text);
    }

    .cib.dng:hover {
      color: var(--red);
    }

    /* =========================================
       Center Panel
       ========================================= */
    .ctr {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    .ch {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 42px;
      gap: 6px;
      transition: background .3s;
    }

    .ch-l {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .bdg {
      font-size: 10px;
      color: var(--text3);
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .cnt {
      font-size: 10px;
      color: var(--text4);
    }

    .mob {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text3);
      padding: 3px 7px;
      cursor: pointer;
      font-size: 13px;
    }

    .mob:hover {
      color: var(--text);
    }

    /* =========================================
       Messages Area
       ========================================= */
    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text4);
      gap: 8px;
    }

    .empty-i {
      font-size: 40px;
      opacity: .25;
    }

    .empty-t {
      font-size: 13px;
    }

    /* =========================================
       Message Bubbles
       ========================================= */
    .m {
      border-radius: var(--rl);
      padding: 12px 14px;
      max-width: 88%;
      position: relative;
      animation: fi .2s;
      box-shadow: var(--sh);
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
      }
    }

    .m-u {
      background: var(--accent-d);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      align-self: flex-end;
    }

    .m-b {
      background: var(--bg1);
      border: 1px solid var(--border);
      align-self: flex-start;
    }

    .m-e {
      background: var(--red-d);
      border: 1px solid color-mix(in srgb, var(--red) 20%, transparent);
      align-self: flex-start;
    }

    /* Editing state */
    .m-u.editing {
      border-style: dashed;
      border-color: var(--yellow);
      opacity: .6;
    }

    .mt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 6px;
    }

    .ml {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .m-u .ml {
      color: var(--accent);
    }

    .m-b .ml {
      color: var(--green);
    }

    .m-e .ml {
      color: var(--red);
    }

    .mmtag {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text4);
      font-size: 9px;
      margin-left: 4px;
    }

    .mm {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .mti {
      font-size: 9px;
      color: var(--text4);
    }

    .macts {
      display: flex;
      gap: 1px;
      opacity: 0;
      transition: opacity .12s;
    }

    .m:hover .macts {
      opacity: 1;
    }

    .ma {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text4);
      font-size: 10px;
      padding: 2px 4px;
      cursor: pointer;
      transition: all .1s;
      line-height: 1;
    }

    .ma:hover {
      color: var(--text2);
      border-color: var(--border);
      background: var(--bg3);
    }

    .ma.dng:hover {
      color: var(--red);
      background: var(--red-d);
    }

    .mtx {
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .m-e .etx {
      color: var(--red);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      opacity: .85;
    }

    .m img.gi {
      max-width: 100%;
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin-top: 6px;
      display: block;
      cursor: zoom-in;
      transition: border-color .15s;
    }

    .m img.gi:hover {
      border-color: var(--accent);
    }

    /* User attached images */
    .m-u .usr-imgs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .m-u .usr-imgs img {
      max-width: 200px;
      max-height: 160px;
      border-radius: var(--r);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      cursor: zoom-in;
      object-fit: cover;
    }

    .info {
      font-size: 9px;
      color: var(--text4);
      margin-top: 2px;
    }

    .dlr {
      display: flex;
      gap: 3px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    /* Reasoning block */
    .rsn {
      background: var(--purple-d);
      border: 1px solid color-mix(in srgb, var(--purple) 20%, transparent);
      border-radius: 6px;
      padding: 7px 9px;
      margin-top: 6px;
    }

    .rsn summary {
      color: var(--purple);
      font-size: 10px;
      cursor: pointer;
      font-weight: 500;
    }

    .rsn .rtx {
      color: var(--text2);
      font-size: 10px;
      margin-top: 5px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      max-height: 180px;
      overflow-y: auto;
    }

    .usg {
      font-size: 9px;
      color: var(--text4);
      margin-top: 4px;
    }

    .rwb {
      margin-top: 5px;
    }

    .rwb summary {
      color: var(--text4);
      font-size: 9px;
      cursor: pointer;
    }

    .rwb .rw {
      font-size: 9px;
      color: var(--text4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
      margin-top: 2px;
    }

    /* Swipe navigation */
    .swn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 5px;
    }

    .swn button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text3);
      font-size: 12px;
      padding: 1px 6px;
      cursor: pointer;
      line-height: 1.2;
    }

    .swn button:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .swn button:disabled {
      opacity: .25;
      cursor: default;
    }

    .swn span {
      font-size: 10px;
      color: var(--text3);
      min-width: 28px;
      text-align: center;
    }

    /* Loading indicator */
    .gi-ind {
      color: var(--text4);
      font-size: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* =========================================
       Input Area
       ========================================= */
    .cinp {
      border-top: 1px solid var(--border);
      padding: 10px 20px 12px;
      background: var(--bg1);
      transition: background .3s;
    }

    .cinp.drag-over {
      border-top: 2px solid var(--accent);
      background: var(--accent-d);
    }

    /* Edit bar */
    .edit-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 5px 8px;
      background: var(--yellow-d);
      border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent);
      border-radius: 6px;
      font-size: 11px;
      color: var(--yellow);
    }

    .edit-bar span {
      flex: 1;
    }

    .edit-bar button {
      background: none;
      border: 1px solid color-mix(in srgb, var(--yellow) 40%, transparent);
      border-radius: 4px;
      color: var(--yellow);
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
    }

    .edit-bar button:hover {
      background: var(--yellow-d);
    }

    /* Attachment preview */
    .attach-preview {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      padding: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .attach-preview:empty {
      display: none;
    }

    .attach-item {
      position: relative;
      display: inline-block;
    }

    .attach-item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .attach-item .attach-rm {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .inr {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }

    .inr textarea {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 180px;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color .2s;
    }

    .inr textarea:focus {
      border-color: var(--accent);
    }

    .inr textarea::placeholder {
      color: var(--text4);
    }

    .attach-btn {
      border: none;
      border-radius: var(--r);
      background: var(--bg3);
      color: var(--text3);
      font-size: 16px;
      padding: 9px 10px;
      cursor: pointer;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      transition: all .15s;
    }

    .attach-btn:hover {
      background: var(--bg4);
      color: var(--text);
    }

    .sbtn {
      border: none;
      border-radius: var(--r);
      color: #fff;
      font-size: 15px;
      padding: 9px 13px;
      cursor: pointer;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      transition: background .15s;
    }

    .sbtn.go {
      background: var(--accent);
    }

    .sbtn.go:hover {
      background: var(--accent2);
    }

    .sbtn.stp {
      background: var(--red);
    }

    .sbtn.stp:hover {
      background: #c62828;
    }

    .sbtn:disabled {
      opacity: .3;
      cursor: default;
    }

    /* =========================================
       Right Panel — Settings
       ========================================= */
    .rps {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ss>.sl {
      font-size: 9px;
      font-weight: 700;
      color: var(--text4);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 5px;
    }

    .si,
    .ssel,
    .sta {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      padding: 6px 9px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }

    .si:focus,
    .ssel:focus,
    .sta:focus {
      border-color: var(--accent);
    }

    .ssel {
      cursor: pointer;
    }

    .sta {
      resize: vertical;
      min-height: 40px;
    }

    .sr {
      display: flex;
      gap: 3px;
      align-items: center;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .sb {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text2);
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
    }

    .sb:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .sba {
      background: var(--accent-d);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sba:hover {
      opacity: .85;
    }

    .sbd {
      color: var(--red);
    }

    .sbd:hover {
      background: var(--red-d);
    }

    .sbw {
      background: var(--yellow-d);
      border-color: color-mix(in srgb, var(--yellow) 40%, transparent);
      color: var(--yellow);
    }

    .sbw:hover {
      opacity: .85;
    }

    .ke {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 7px;
      margin-top: 5px;
    }

    .ke .si {
      margin-bottom: 4px;
    }

    .slr {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .slr input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      outline: none;
    }

    .slr input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--bg1);
    }

    .sli {
      width: 44px;
      font-size: 10px;
      text-align: center;
      padding: 3px 2px;
    }

    .hn {
      font-size: 9px;
      color: var(--text4);
      margin-top: 2px;
      line-height: 1.35;
    }

    .wb {
      font-size: 9px;
      color: var(--yellow);
      background: var(--yellow-d);
      border: 1px solid color-mix(in srgb, var(--yellow) 30%, transparent);
      border-radius: 4px;
      padding: 4px 7px;
      margin-top: 4px;
      line-height: 1.3;
    }

    /* =========================================
       Theme picker
       ========================================= */
    .thr {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .th-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 32px;
    }

    .thp {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .15s;
    }

    .thp:hover {
      transform: scale(1.15);
    }

    .thp.act {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .thn {
      font-size: 7px;
      color: var(--text4);
      text-align: center;
      margin-top: 2px;
      line-height: 1.15;
      width: 100%;
      overflow: hidden;
    }

    /* =========================================
       Spinner
       ========================================= */
    .spn {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--text3);
      border-radius: 50%;
      animation: sp .6s linear infinite;
    }

    @keyframes sp {
      to {
        transform: rotate(360deg);
      }
    }

    /* =========================================
       Toast
       ========================================= */
    .tst {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--bg3);
      color: var(--text);
      padding: 8px 18px;
      border-radius: var(--r);
      font-size: 12px;
      border: 1px solid var(--border-l);
      opacity: 0;
      transition: all .25s;
      pointer-events: none;
      z-index: 9999;
      box-shadow: var(--sh);
    }

    .tst.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* =========================================
       Image Overlay
       ========================================= */
    .ov {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      padding: 16px;
    }

    .ov.act {
      display: flex;
    }

    .ov img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 6px;
      object-fit: contain;
    }

    /* =========================================
       Undo Bar
       ========================================= */
    .ubar {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      border: 1px solid var(--border-l);
      color: var(--text);
      padding: 8px 16px;
      border-radius: var(--r);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 900;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .15);
      animation: fi .2s;
    }

    .ubar button {
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: #fff;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 11px;
    }

    .ubar .ubx {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
    }

    /* Panel backdrop (mobile) */
    .pbd {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 99;
    }

    .pbd.show {
      display: block;
    }

    /* =========================================
       Gallery Modal
       ========================================= */
    .gal-ov {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 800;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .gal-ov.act {
      display: flex;
    }

    .gal-box {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--rl);
      width: 90%;
      max-width: 900px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .gal-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .gal-head h3 {
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .gal-search {
      flex: 1;
      max-width: 260px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      font-family: inherit;
    }

    .gal-search:focus {
      border-color: var(--accent);
    }

    .gal-search::placeholder {
      color: var(--text4);
    }

    .gal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .gal-item {
      position: relative;
      border-radius: var(--r);
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
    }

    .gal-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--r);
      border: 1px solid var(--border);
      transition: border-color .15s;
    }

    .gal-item img:hover {
      border-color: var(--accent);
    }

    .gal-item .gal-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3px 6px;
      background: rgba(0, 0, 0, .7);
      font-size: 8px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gal-item .gal-dl {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0, 0, 0, .7);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }

    .gal-item:hover .gal-dl {
      opacity: 1;
    }

    /* =========================================
       Preset Editor Modal
       ========================================= */
    .preset-ov {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      z-index: 810;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .preset-ov.act {
      display: flex;
    }

    .preset-box {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--rl);
      width: 90%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preset-box-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preset-box-head h3 {
      font-size: 14px;
      font-weight: 600;
    }

    .preset-box-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .preset-box-body label {
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
    }

    .preset-box-foot {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    /* =========================================
       Presets List
       ========================================= */
    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-top: 4px;
      max-height: 150px;
      overflow-y: auto;
    }

    .preset-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 7px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 10px;
      cursor: pointer;
      transition: all .12s;
    }

    .preset-item:hover {
      background: var(--bg3);
      border-color: var(--border-l);
    }

    .preset-item.preset-active {
      border-color: var(--accent);
      background: var(--accent-d);
    }

    .preset-item .preset-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .preset-item .preset-edit {
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 10px;
      padding: 0 3px;
      flex-shrink: 0;
    }

    .preset-item .preset-edit:hover {
      color: var(--accent);
    }

    .preset-item .preset-del {
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 10px;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .preset-item .preset-del:hover {
      color: var(--red);
    }

    /* =========================================
       Mobile
       ========================================= */
    @media(max-width: 950px) {

      .lp,
      .rp {
        position: fixed;
        top: 0;
        bottom: 0;
        z-index: 100;
        transition: transform .22s;
      }

      .lp {
        left: 0;
        transform: translateX(-100%);
      }

      .lp.open {
        transform: translateX(0);
      }

      .rp {
        right: 0;
        transform: translateX(100%);
      }

      .rp.open {
        transform: translateX(0);
      }

      .mob {
        display: block;
      }

      .rz {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="layout" id="layout">

    <!-- =============================================
         Left Panel — Chat List
         ============================================= -->
    <div class="lp" id="lp">
      <div class="lp-h">
        <div class="lp-h-top">
          <h2>Чаты</h2>
          <div class="lp-h-btns">
            <button class="sb" onclick="exportAllData()" title="Экспорт всех данных">📥</button>
            <button class="sb" onclick="importAllData()" title="Импорт данных">📤</button>
            <button class="sb sba" onclick="newChat()">+ Новый</button>
          </div>
        </div>
        <input class="lp-search" id="chatSearch" type="text" placeholder="🔍 Поиск по чатам..." oninput="filterChats()">
      </div>
      <div class="cl" id="cl"></div>
    </div>

    <div class="rz" id="resL"></div>

    <!-- =============================================
         Center — Messages
         ============================================= -->
    <div class="ctr">
      <div class="ch">
        <div class="ch-l">
          <button class="mob" onclick="togL()">☰</button>
          <span class="bdg" id="hM">—</span>
          <span class="cnt" id="hC"></span>
        </div>
        <div style="display:flex;gap:3px">
          <button class="sb" onclick="openGallery()" title="Галерея">🖼️</button>
          <button class="sb sbd" onclick="clrChat()" title="Очистить">🗑️</button>
          <button class="mob" onclick="togR()">⚙️</button>
        </div>
      </div>

      <div class="msgs" id="msgs">
        <div class="empty" id="emS">
          <div class="empty-i">🎨</div>
          <div class="empty-t">Blink Generator</div>
        </div>
      </div>

      <div class="cinp" id="cinp">
        <div id="editBar"></div>
        <div class="attach-preview" id="attachPreview"></div>
        <div class="inr">
          <button class="attach-btn" onclick="document.getElementById('fileInput').click()"
            title="Прикрепить изображение">📎</button>
          <textarea id="pr" placeholder="Сообщение... (Enter — отправить, можно перетащить картинку)"
            rows="1"></textarea>
          <button class="sbtn go" id="sBtn" onclick="onSend()">▶</button>
        </div>
      </div>
    </div>

    <div class="rz" id="resR"></div>

    <!-- =============================================
         Right Panel — Settings
         ============================================= -->
    <div class="rp" id="rp">
      <div class="rps">

  <script>
    /* =====================================================
       IndexedDB — Image Storage
       ===================================================== */
    const DB_NAME = 'BlinkDB2';
    let idb = null;

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          e.target.result.createObjectStore('img');
        };
        request.onsuccess = (e) => {
          idb = e.target.result;
          resolve();
        };
        request.onerror = reject;
      });
    }

    function dbPut(key, value) {
      return new Promise((resolve) => {
        const tx = idb.transaction('img', 'readwrite');
        tx.objectStore('img').put(value, key);
        tx.oncomplete = resolve;
      });
    }

    function dbGet(key) {
      return new Promise((resolve) => {
        const tx = idb.transaction('img', 'readonly');
        const req = tx.objectStore('img').get(key);
        req.onsuccess = () => resolve(req.result);
      });
    }

    function generateImageKey() {
      return 'i' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    }

    async function saveImage(dataUrl) {
      const key = generateImageKey();
      await dbPut(key, dataUrl);
      return key;
    }

    async function loadImage(key) {
      if (!key) return null;
      if (key.startsWith('data:') || key.startsWith('http')) return key;
      return await dbGet(key);
    }


    /* =====================================================

      'alibaba/qwen-3-4b', 'alibaba/qwen-3-8b',
      'alibaba/qwen-3-coder', 'alibaba/qwq-32b'
    ];

    const IMAGE_MODELS = new Set([
      'google/gemini-2.5-flash-image',
      'google/gemini-3-pro-image',
      'google/gemini-3.1-flash-image-preview'
    ]);

    let modelFilter = 'image';

    function renderModels() {
      const container = document.getElementById('mC');
      container.innerHTML = '';

      const filters = [
        { id: 'image', label: '🖼️ Картинки' },
        { id: 'chat', label: '💬 Чат' },
        { id: 'all', label: 'Все' }
      ];

      filters.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'sb' + (modelFilter === f.id ? ' sba' : '');
        btn.textContent = f.label;
        btn.onclick = () => {
          modelFilter = f.id;
          renderModels();
        };
        container.appendChild(btn);
      });

      const select = document.getElementById('mS');
      const prev = select.value || lsGet('model') || 'google/gemini-3.1-flash-image-preview';
      select.innerHTML = '';

      const filtered = modelFilter === 'all'
        ? ALL_MODELS
        : ALL_MODELS.filter(m => modelFilter === 'image' ? IMAGE_MODELS.has(m) : !IMAGE_MODELS.has(m));

      const groups = new Map();
      filtered.forEach(m => {
        const vendor = m.split('/')[0];
        if (!groups.has(vendor)) groups.set(vendor, []);
        groups.get(vendor).push(m);
      });

      for (const [vendor, models] of groups) {
        const optgroup = document.createElement('optgroup');
        optgroup.label = vendor[0].toUpperCase() + vendor.slice(1);
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.textContent = m.split('/')[1] + (IMAGE_MODELS.has(m) ? ' 🖼️' : '');
          optgroup.appendChild(opt);
        });
        select.appendChild(optgroup);
      }

      if ([...select.options].some(o => o.value === prev)) {
        select.value = prev;
      }

      onModelSelect();
    }

    function onModelSelect() {
      const model = document.getElementById('mS').value;
      lsSet('model', model);
      document.getElementById('hM').textContent = model ? model.split('/')[1] : '—';

      const warning = document.getElementById('mW');
      if (model && !IMAGE_MODELS.has(model)) {
        warning.textContent = 'ℹ️ Текстовая модель — не генерирует картинки.';
        warning.style.display = 'block';
      } else {
        warning.style.display = 'none';
      }

      document.getElementById('iSS').style.display = IMAGE_MODELS.has(model) ? '' : 'none';
    }

    // Alias for HTML onchange
    const onMS = onModelSelect;


    /* =====================================================
       Themes
       ===================================================== */
    const THEMES = [
      { id: 'default', n: 'Серая', c: '#1e1e22' },
      { id: 'dgray', n: 'Тёмно-серая', c: '#18181b' },
      { id: 'dark', n: 'Тёмная', c: '#0a0a0c' },
      { id: 'coal', n: 'Уголь', c: '#16161c' },
      { id: 'graphite', n: 'Графит', c: '#1a1a20' },
      { id: 'midnight', n: 'Полночь', c: '#111827' },
      { id: 'abyss', n: 'Бездна', c: '#0a0f1e' },
      { id: 'dracula', n: 'Дракула', c: '#282a36' },
      { id: 'forest', n: 'Лес', c: '#0a150a' },
      { id: 'ocean', n: 'Океан', c: '#081a16' },
      { id: 'amethyst', n: 'Аметист', c: '#120e1a' },
      { id: 'rose', n: 'Роза', c: '#15090d' },
      { id: 'sunset', n: 'Закат', c: '#1a0f08' },
      { id: 'white', n: 'Белая', c: '#ffffff', ring: '#ccc' },
    ];

    function renderThemes() {
      const container = document.getElementById('thR');
      container.innerHTML = '';
      const current = lsGet('theme') || 'default';

      THEMES.forEach(t => {
        const wrap = document.createElement('div');
        wrap.className = 'th-item';

        const dot = document.createElement('div');
        dot.className = 'thp' + (current === t.id ? ' act' : '');
        dot.style.background = t.c;
        if (t.ring) dot.style.borderColor = t.ring;
        dot.title = t.n;
        dot.onclick = () => {
          lsSet('theme', t.id);
          applyTheme();
          renderThemes();
        };
        wrap.appendChild(dot);

        const label = document.createElement('div');
        label.className = 'thn';
        label.textContent = t.n;
        wrap.appendChild(label);

        container.appendChild(wrap);
      });
    }

    function applyTheme() {
      const theme = lsGet('theme') || 'default';
      document.body.setAttribute('data-theme', theme === 'default' ? '' : theme);
    }


    /* =====================================================
       LocalStorage Helpers
       ===================================================== */
    function lsGet(key) {
      return localStorage.getItem('bg_' + key);
    }

    function lsSet(key, value) {
      localStorage.setItem('bg_' + key, value);
    }


    /* =====================================================
       Settings Save / Load
       ===================================================== */
    let _saveTimer;

    function debouncedSave() {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(saveAllSettings, 400);
    }

    // Alias for HTML oninput
    const svD = debouncedSave;

    function saveAllSettings() {
      lsSet('sP', document.getElementById('sP').value);
      lsSet('nP', document.getElementById('nP').value);
      lsSet('aR', document.getElementById('aR').value);
      lsSet('ctx', document.getElementById('cI').value);
      lsSet('tmp', document.getElementById('tI').value);
    }

    function loadAllSettings() {
      document.getElementById('sP').value = lsGet('sP') || '';
      document.getElementById('nP').value = lsGet('nP') || '';
      document.getElementById('aR').value = lsGet('aR') || '';

      const ctx = parseInt(lsGet('ctx')) || 20;
      document.getElementById('cR').value = Math.min(ctx, 50);
      document.getElementById('cI').value = ctx;
      updateContextHint(ctx);

      const temp = parseFloat(lsGet('tmp'));
      if (!isNaN(temp)) {
        document.getElementById('tR').value = Math.round(temp * 100);
        document.getElementById('tI').value = temp.toFixed(1);
      }
    }


    /* =====================================================
       Context & Temperature Controls
       ===================================================== */
    function onCR() {
      const val = +document.getElementById('cR').value;
      document.getElementById('cI').value = val;
      updateContextHint(val);
      debouncedSave();
    }

    function onCI() {
      let val = parseInt(document.getElementById('cI').value) || 0;
      if (val < 0) val = 0;
      document.getElementById('cR').value = Math.min(val, 50);
      updateContextHint(val);
      debouncedSave();
    }

    function updateContextHint(val) {
      document.getElementById('cH').textContent = val === 0
        ? 'Без памяти — каждый запрос отдельно.'
        : 'Последние ' + val + ' сообщ. как контекст.';
    }

    function onTR() {
      document.getElementById('tI').value = (+document.getElementById('tR').value / 100).toFixed(1);
      debouncedSave();
    }

    function onTI() {
      let val = parseFloat(document.getElementById('tI').value);
      if (isNaN(val)) val = 1;
      val = Math.max(0, Math.min(2, val));
      document.getElementById('tR').value = Math.round(val * 100);
      debouncedSave();
    }


    /* =====================================================
       API Keys
       ===================================================== */
    function getKeys() {
      try { return JSON.parse(localStorage.getItem('bg_keys') || '[]'); }
      catch { return []; }
    }

    function saveKeys(keys) {
      localStorage.setItem('bg_keys', JSON.stringify(keys));
    }

    function renderKeySelect() {
      const select = document.getElementById('kS');
      const keys = getKeys();
      const saved = lsGet('selK') || '';

      select.innerHTML = '<option value="">— Выберите —</option>';
      keys.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k.id;
        opt.textContent = k.name || '—';
        if (k.id === saved) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function onKS() {
      lsSet('selK', document.getElementById('kS').value);
    }

    function activeKey() {
      const id = document.getElementById('kS').value;
      return (getKeys().find(k => k.id === id) || {}).key || '';
    }

    let editingKeyId = '';

    function newKE() {
      editingKeyId = '';
      document.getElementById('kN').value = '';
      document.getElementById('kV').value = '';
      document.getElementById('kV').type = 'password';
      document.getElementById('kE').style.display = 'block';
    }

    function canKE() {
      document.getElementById('kE').style.display = 'none';
      editingKeyId = '';
    }

    function savK() {
      const name = document.getElementById('kN').value.trim();
      const value = document.getElementById('kV').value.trim();
      if (!value) { showToast('Введите ключ'); return; }

      let keys = getKeys();
      if (editingKeyId) {
        const idx = keys.findIndex(k => k.id === editingKeyId);
        if (idx !== -1) {
          keys[idx].name = name || 'Без имени';
          keys[idx].key = value;
        }
        saveKeys(keys);
        renderKeySelect();
        canKE();
        showToast('Обновлён');
      } else {
        const id = 'k' + Date.now() + Math.random().toString(36).slice(2, 5);
        keys.push({ id, name: name || 'Без имени', key: value });
        saveKeys(keys);
        lsSet('selK', id);
        renderKeySelect();
        canKE();
        showToast('Добавлен');
      }
    }

    function edK() {
      const id = document.getElementById('kS').value;
      if (!id) { showToast('Выберите ключ'); return; }
      const key = getKeys().find(x => x.id === id);
      if (!key) return;
      editingKeyId = id;
      document.getElementById('kN').value = key.name;
      document.getElementById('kV').value = key.key;
      document.getElementById('kV').type = 'password';
      document.getElementById('kE').style.display = 'block';
    }

    function delK() {
      const id = document.getElementById('kS').value;
      if (!id) { showToast('Выберите ключ'); return; }
      if (!confirm('Удалить?')) return;
      saveKeys(getKeys().filter(k => k.id !== id));
      lsSet('selK', '');
      renderKeySelect();
      canKE();
      showToast('Удалён');
    }

    function togKV() {
      const input = document.getElementById('kV');
      input.type = input.type === 'password' ? 'text' : 'password';
    }


    /* =====================================================
       Chats Storage
       ===================================================== */
    function getChats() {
      try { return JSON.parse(localStorage.getItem('bg_chats') || '[]'); }
      catch { return []; }
    }

    function saveChats(chats) {
      localStorage.setItem('bg_chats', JSON.stringify(chats));
    }

    let currentChat = null;
    let messageEntries = [];
    let messageCounter = 0;
    let chatFullyLoaded = false;

    function newChat() {
      const id = 'c' + Date.now();
      const chat = { id, name: 'Новый чат', created: Date.now(), messages: [] };
      const chats = getChats();
      chats.unshift(chat);
      saveChats(chats);
      switchChat(id);
      showToast('Чат создан');
    }

    function switchChat(id) {
      saveCurrentChat();
      cancelEdit(); // cancel any in-progress edit
      chatFullyLoaded = false;
      
      const chats = getChats();
      currentChat = chats.find(c => c.id === id) || null;
      if (!currentChat) { newChat(); return; }
      lsSet('aCh', id);
      renderChatList();
      renderMessages();
      closePanel();
    }

    function saveCurrentChat() {
      if (!currentChat) return;
      if (!chatFullyLoaded) return;
      currentChat.messages = messageEntries.map(m => ({
        role: m.role,
        text: m.text,
        model: m.model || '',
        imageKeys: m.imageKeys || [],
        userImageKeys: m.userImageKeys || [],
        reasoning: m.reasoning || '',
        usage: m.usage || null,
        elapsed: m.elapsed || '',
        ts: m.ts || Date.now(),
        swipes: m.swipes || [],
        swipeIdx: m.swipeIdx || 0
      }));
      const chats = getChats();
      const idx = chats.findIndex(c => c.id === currentChat.id);
      if (idx !== -1) chats[idx] = currentChat;
      else chats.unshift(currentChat);
      saveChats(chats);
    }

    function delChat(id) {
      if (!confirm('Удалить чат?')) return;
      let chats = getChats().filter(c => c.id !== id);
      saveChats(chats);
      if (currentChat && currentChat.id === id) {
        currentChat = null;
        messageEntries = [];
        if (chats.length) switchChat(chats[0].id);
        else newChat();
      } else {
        renderChatList();
      }
      showToast('Чат удалён');
    }

    function renChat(id) {
      const chats = getChats();
      const chat = chats.find(c => c.id === id);
      if (!chat) return;
      const name = prompt('Название:', chat.name);
      if (name === null) return;
      chat.name = name.trim() || 'Чат';
      if (currentChat && currentChat.id === id) currentChat.name = chat.name;
      saveChats(chats);
      renderChatList();
    }

    function renderChatList() {
      const list = document.getElementById('cl');
      const chats = getChats();
      const activeId = currentChat ? currentChat.id : '';
      const query = (document.getElementById('chatSearch').value || '').toLowerCase().trim();

      list.innerHTML = '';

      const filtered = query
        ? chats.filter(c =>
          c.name.toLowerCase().includes(query) ||
          (c.messages || []).some(m => (m.text || '').toLowerCase().includes(query))
        )
        : chats;

      if (!filtered.length) {
        list.innerHTML = '<div style="color:var(--text4);font-size:11px;text-align:center;padding:20px">' +
          (query ? 'Ничего не найдено' : 'Нет чатов') + '</div>';
        return;
      }

      filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = 'ci' + (c.id === activeId ? ' act' : '');
        const dt = new Date(c.created);
        div.innerHTML = `
          <div class="ci-i" onclick="switchChat('${c.id}')">
            <div class="ci-n">${escapeHtml(c.name)}</div>
            <div class="ci-m">${(c.messages || []).length} · ${dt.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' })} ${dt.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}</div>
          </div>
          <div class="ci-a">
            <button class="cib" onclick="event.stopPropagation();renChat('${c.id}')">✏️</button>
            <button class="cib dng" onclick="event.stopPropagation();delChat('${c.id}')">✕</button>
          </div>`;
        list.appendChild(div);
      });
    }

    function filterChats() {
      renderChatList();
    }

    async function renderMessages() {
      chatFullyLoaded = false;

      const box = document.getElementById('msgs');
      box.innerHTML = '';
      messageEntries = [];
      messageCounter = 0;

      if (!currentChat || !currentChat.messages.length) {
        box.innerHTML = '<div class="empty" id="emS"><div class="empty-i">🎨</div><div class="empty-t">Blink Generator</div></div>';
        updateHeader();
        chatFullyLoaded = true;
        return;
      }

      for (const m of currentChat.messages) {
        if (m.role === 'user') {
          await addUserMessage(m.text, m.ts, false, m.userImageKeys || []);
        } else if (m.role === 'assistant') {
          await addBotMessage(m.model, m.imageKeys || [], m.text, m.reasoning, m.usage, m.elapsed, null, m.ts, false, m.swipes || [], m.swipeIdx || 0);
        } else if (m.role === 'error') {
          addErrorMessage(m.model, m.text, null, m.ts, false);
        }
      }

      updateHeader();
      scrollToBottom();
      chatFullyLoaded = true;
    }

    function clrChat() {
      if (!currentChat || !messageEntries.length) return;
      if (!confirm('Очистить?')) return;
      currentChat.messages = [];
      messageEntries = [];
      saveCurrentChat();
      renderMessages();
      showToast('Очищен');
    }

    function updateHeader() {
      document.getElementById('hC').textContent =
        messageEntries.length ? messageEntries.length + ' сообщ.' : '';
    }

    function formatTime(ts) {
      const d = ts ? new Date(ts) : new Date();
      return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }


    /* =====================================================
       Undo System
       ===================================================== */
    let undoStack = [];
    let undoTimer = null;

    function pushUndo(label, fn) {
      undoStack = [{ label, fn }];
      showUndoBar(label);
    }

    function showUndoBar(label) {
      clearTimeout(undoTimer);
      document.getElementById('uC').innerHTML = `
        <div class="ubar">
          <span>${escapeHtml(label)}</span>
          <button onclick="doUndo()">Отменить</button>
          <button class="ubx" onclick="dismissUndo()">✕</button>
        </div>`;
      undoTimer = setTimeout(dismissUndo, 8000);
    }

    function doUndo() {
      if (!undoStack.length) return;
      undoStack.pop().fn();
      dismissUndo();
      showToast('Отменено');
    }

    function dismissUndo() {
      clearTimeout(undoTimer);
      document.getElementById('uC').innerHTML = '';
      undoStack = [];
    }


    /* =====================================================
       Attachments — Drag & Drop, Paste, Clip Button
       ===================================================== */
    let pendingAttachments = [];

    function handleFileAttach(event) {
      for (const file of event.target.files) {
        if (!file.type.startsWith('image/')) continue;
        const reader = new FileReader();
        reader.onload = (e) => {
          pendingAttachments.push({ dataUrl: e.target.result, name: file.name });
          renderAttachPreview();
        };
        reader.readAsDataURL(file);
      }
      event.target.value = '';
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('cinp').classList.remove('drag-over');
      for (const file of e.dataTransfer.files) {
        if (!file.type.startsWith('image/')) continue;
        const reader = new FileReader();
        reader.onload = (ev) => {
          pendingAttachments.push({ dataUrl: ev.target.result, name: file.name });
          renderAttachPreview();
        };
        reader.readAsDataURL(file);
      }
    }

    function handlePaste(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          const reader = new FileReader();
          reader.onload = (ev) => {
            pendingAttachments.push({ dataUrl: ev.target.result, name: 'clipboard.png' });
            renderAttachPreview();
          };
          reader.readAsDataURL(file);
        }
      }
    }

    function removeAttachment(idx) {
      pendingAttachments.splice(idx, 1);
      renderAttachPreview();
    }

    function renderAttachPreview() {
      const container = document.getElementById('attachPreview');
      container.innerHTML = '';
      pendingAttachments.forEach((att, idx) => {
        const item = document.createElement('div');
        item.className = 'attach-item';
        item.innerHTML = `
          <img src="${escapeAttr(att.dataUrl)}" alt="${escapeAttr(att.name)}"
               title="${escapeAttr(att.name)}"/>
          <button class="attach-rm" onclick="removeAttachment(${idx})">✕</button>`;
        container.appendChild(item);
      });
    }


    /* =====================================================
       Edit Mode — Non-destructive editing
       ===================================================== */
    let editingMessageId = null;
    let editPrevPrompt = '';
    let editPrevAttachments = [];

    function startEdit(id) {
      const idx = messageEntries.findIndex(x => x.id === id);
      if (idx === -1) return;
      const entry = messageEntries[idx];
      if (entry.role !== 'user') return;

      // If already editing something else, cancel first
      if (editingMessageId) cancelEdit();

      editingMessageId = id;
      editPrevPrompt = document.getElementById('pr').value;
      editPrevAttachments = [...pendingAttachments];

      // Copy text to input
      document.getElementById('pr').value = entry.text;
      autoResize(document.getElementById('pr'));
      document.getElementById('pr').focus();

      // Mark message visually
      entry.el.classList.add('editing');

      // Show edit bar
      renderEditBar();
    }

    function cancelEdit() {
      if (!editingMessageId) return;

      const entry = messageEntries.find(m => m.id === editingMessageId);
      if (entry && entry.el) {
        entry.el.classList.remove('editing');
      }

      // Restore previous input
      document.getElementById('pr').value = editPrevPrompt;
      autoResize(document.getElementById('pr'));
      pendingAttachments = editPrevAttachments;
      renderAttachPreview();

      editingMessageId = null;
      editPrevPrompt = '';
      editPrevAttachments = [];

      document.getElementById('editBar').innerHTML = '';
    }

    function confirmEdit() {
      if (!editingMessageId) return;

      const newText = document.getElementById('pr').value.trim();
      if (!newText) {
        showToast('Введите текст');
        return;
      }

      const idx = messageEntries.findIndex(x => x.id === editingMessageId);
      if (idx === -1) { cancelEdit(); return; }

      const entry = messageEntries[idx];
      entry.el.classList.remove('editing');

      // Update the message text
      entry.text = newText;

      // Update the DOM
      const mtxEl = entry.el.querySelector('.mtx');
      if (mtxEl) mtxEl.innerHTML = escapeHtml(newText);

      // Clear edit state
      editingMessageId = null;
      editPrevPrompt = '';
      editPrevAttachments = [];
      document.getElementById('pr').value = '';
      autoResize(document.getElementById('pr'));
      pendingAttachments = [];
      renderAttachPreview();
      document.getElementById('editBar').innerHTML = '';

      saveCurrentChat();
      showToast('Сообщение обновлено');
    }

    function renderEditBar() {
      document.getElementById('editBar').innerHTML = `
        <div class="edit-bar">
          <span>✏️ Редактирование сообщения</span>
          <button onclick="cancelEdit()">✕ Отмена</button>
        </div>`;
    }

    function findLastByRole(role) {

    async function addUserMessage(text, ts, save = true, userImageKeys = []) {

      div.className = 'm m-u';

      if (userImageKeys.length) {
        imagesHtml = '<div class="usr-imgs">';
        for (const k of userImageKeys) {

        }

        <div class="mt">

        </div>

    async function addBotMessage(model, imageKeys, text, reasoning, usage, elapsed, rawData, ts, save = true, swipes = [], swipeIdx = 0) {
      removeEmpty();
      const box = document.getElementById('msgs');
      const id = 'm' + (++messageCounter);
      const div = document.createElement('div');
      div.className = 'm m-b';
      div.id = id;

      // Load images
      const loadedImages = [];
      for (const k of (imageKeys || [])) {
        const src = await loadImage(k);
        if (src) loadedImages.push({ key: k, src });
      }

      let html = `
        <div class="mt">
          <span class="ml">Ассистент<span class="mmtag">${escapeHtml((model || '').split('/')[1] || '')}</span></span>
          <div class="mm">
            <span class="mti">${formatTime(ts)}</span>
            <div class="macts" id="a_${id}"></div>
          </div>
        </div>`;

      // Reasoning
      if (reasoning) {
        html += `<details class="rsn"><summary>🧠 Рассуждение</summary><div class="rtx">${escapeHtml(reasoning)}</div></details>`;
      }

      // Images
      if (loadedImages.length) {
        loadedImages.forEach((img) => {
          html += `<img class="gi" src="${escapeAttr(img.src)}" alt="img" onclick="openOverlay(this.src)"/>`;
        });
        html += '<div class="dlr">';
        loadedImages.forEach((img, i) => {
          html += `<button class="sb" style="font-size:10px;padding:3px 7px" data-src="${encodeURIComponent(img.src)}" onclick="downloadImage(this,${i})">⬇️${loadedImages.length > 1 ? ' #' + (i + 1) : ' Скачать'}</button>`;
        });
        html += '</div>';
      }

      // Text
      if (text) {
        html += `<div class="mtx">${escapeHtml(text)}</div>`;
      }

      // Empty response
      if (!loadedImages.length && !text && !reasoning) {
        html += `<div class="mtx" style="color:var(--text4)">Пустой ответ. Возможно цензура заблокировала содержимое.</div>`;
      }

      // Swipe navigation
      if (swipes && swipes.length > 1) {
        html += `<div class="swn">
          <button onclick="swipeMessage('${id}',-1)"${swipeIdx <= 0 ? ' disabled' : ''}>◀</button>
          <span>${swipeIdx + 1} / ${swipes.length}</span>
          <button onclick="swipeMessage('${id}',1)"${swipeIdx >= swipes.length - 1 ? ' disabled' : ''}>▶</button>
        </div>`;
      }

      // Usage info — compact format
      const uParts = [];
      if (usage && usage.total_tokens != null) {
        let tokenStr = usage.total_tokens + ' токенов';
        if (usage.prompt_tokens != null && usage.completion_tokens != null) {
          tokenStr += ' (' + usage.prompt_tokens + ' → ' + usage.completion_tokens + ')';
        }
        uParts.push(tokenStr);
      }
      if (elapsed) uParts.push(elapsed + 'с');
      if (uParts.length) {
        html += `<div class="usg">${escapeHtml(uParts.join(' · '))}</div>`;
      }

      // Raw response
      if (rawData) {
        html += `<details class="rwb"><summary>📄 Ответ</summary><div class="rw">${escapeHtml(JSON.stringify(rawData, null, 2))}</div></details>`;
      }

      div.innerHTML = html;
      box.appendChild(div);

      messageEntries.push({
        id, role: 'assistant', text, model,
        imageKeys: imageKeys || [], userImageKeys: [],
        reasoning: reasoning || '', usage: usage || null,
        elapsed: elapsed || '', ts: ts || Date.now(), el: div,
        swipes: swipes || [], swipeIdx: swipeIdx || 0
      });

      refreshActions();
      if (save) { updateHeader(); saveCurrentChat(); }
      scrollToBottom();
    }
