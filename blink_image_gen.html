<!DOCTYPE html>
<html lang="ru">

<head>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <meta charset="UTF-8">
  <title>Blink Generator</title>
  <style>
    /* DEFAULT = Серая (приятная глазу, по умолчанию) */
    :root {
      --bg: #1e1e22;
      --bg1: #242428;
      --bg2: #212125;
      --bg3: #2c2c32;
      --bg4: #38383f;
      --border: #303038;
      --border-l: #3a3a44;
      --text: #d0d0d6;
      --text2: #a8a8b2;
      --text3: #747480;
      --text4: #58585f;
      --accent: #5b9ef0;
      --accent2: #4088e0;
      --accent-d: #1a2e4a;
      --green: #4abe6a;
      --green-d: #142e1e;
      --red: #e85454;
      --red-d: #361212;
      --yellow: #d4a824;
      --yellow-d: #30260c;
      --purple: #9878d0;
      --purple-d: #241838;
      --r: 8px;
      --rl: 12px;
      --sh: 0 1px 3px rgba(0, 0, 0, .3);
    }

    /* Белая */
    [data-theme="white"] {
      --bg: #fff;
      --bg1: #fff;
      --bg2: #fafafa;
      --bg3: #f0f0f0;
      --bg4: #e4e4e4;
      --border: #e8e8e8;
      --border-l: #ddd;
      --text: #111;
      --text2: #333;
      --text3: #777;
      --text4: #aaa;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accent-d: #dbeafe;
      --green: #16a34a;
      --green-d: #dcfce7;
      --red: #dc2626;
      --red-d: #fee2e2;
      --yellow: #ca8a04;
      --yellow-d: #fefce8;
      --purple: #7c3aed;
      --purple-d: #f3e8ff;
      --sh: 0 1px 3px rgba(0, 0, 0, .04)
    }

    /* Тёмно-серая */
    [data-theme="dgray"] {
      --bg: #0a0a0b;
      --bg1: #111113;
      --bg2: #18181b;
      --bg3: #222226;
      --bg4: #2c2c32;
      --border: #2a2a30;
      --border-l: #353540;
      --text: #e4e4e7;
      --text2: #b0b0b8;
      --text3: #77778a;
      --text4: #55556a;
      --accent: #3b82f6;
      --accent2: #2563eb;
      --accent-d: #1e3a5f;
      --green: #22c55e;
      --green-d: #14532d;
      --red: #ef4444;
      --red-d: #450a0a;
      --yellow: #eab308;
      --yellow-d: #422006;
      --purple: #a855f7;
      --purple-d: #3b0764;
      --sh: 0 1px 4px rgba(0, 0, 0, .3)
    }

    /* Тёмная */
    [data-theme="dark"] {
      --bg: #050506;
      --bg1: #0a0a0c;
      --bg2: #0f0f12;
      --bg3: #161619;
      --bg4: #1e1e22;
      --border: #1a1a20;
      --border-l: #252530;
      --text: #d4d4d8;
      --text2: #a0a0aa;
      --text3: #6a6a78;
      --text4: #4a4a58;
      --accent: #3b82f6;
      --accent2: #2563eb;
      --accent-d: #172e50;
      --green: #22c55e;
      --green-d: #0f3d20;
      --red: #ef4444;
      --red-d: #3a0808;
      --yellow: #eab308;
      --yellow-d: #352004;
      --purple: #a855f7;
      --purple-d: #2e0a5a;
      --sh: 0 1px 4px rgba(0, 0, 0, .5)
    }

    /* Полночь */
    [data-theme="midnight"] {
      --bg: #070b14;
      --bg1: #0c1120;
      --bg2: #111827;
      --bg3: #1e283a;
      --bg4: #2a3a50;
      --border: #1e2d4a;
      --border-l: #2a3d5a;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --text4: #475569;
      --accent: #6366f1;
      --accent2: #4f46e5;
      --accent-d: #1e1b4b;
      --green: #34d399;
      --green-d: #064e3b;
      --red: #f87171;
      --red-d: #450a0a;
      --yellow: #fbbf24;
      --yellow-d: #422006;
      --purple: #a78bfa;
      --purple-d: #2e1065;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Бездна */
    [data-theme="abyss"] {
      --bg: #03050a;
      --bg1: #060a14;
      --bg2: #0a0f1e;
      --bg3: #14203a;
      --bg4: #1e3050;
      --border: #152040;
      --border-l: #1e3060;
      --text: #c8d6e5;
      --text2: #8395a7;
      --text3: #576574;
      --text4: #3a4a5c;
      --accent: #0abde3;
      --accent2: #0984b0;
      --accent-d: #0a2940;
      --green: #00d2d3;
      --green-d: #0a2940;
      --red: #ff6b6b;
      --red-d: #3a0a0a;
      --yellow: #feca57;
      --yellow-d: #3a2a06;
      --purple: #48dbfb;
      --purple-d: #0a2030;
      --sh: 0 1px 4px rgba(0, 0, 0, .5)
    }

    /* Дракула */
    [data-theme="dracula"] {
      --bg: #181a26;
      --bg1: #21222c;
      --bg2: #282a36;
      --bg3: #333548;
      --bg4: #44475a;
      --border: #383a4a;
      --border-l: #44475a;
      --text: #f8f8f2;
      --text2: #ccc;
      --text3: #888;
      --text4: #6272a4;
      --accent: #bd93f9;
      --accent2: #a070e0;
      --accent-d: #2a1a4a;
      --green: #50fa7b;
      --green-d: #0a3a1a;
      --red: #ff5555;
      --red-d: #3a0a0a;
      --yellow: #f1fa8c;
      --yellow-d: #3a3a06;
      --purple: #ff79c6;
      --purple-d: #3a0a2a;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Уголь */
    [data-theme="coal"] {
      --bg: #101014;
      --bg1: #16161c;
      --bg2: #1c1c24;
      --bg3: #26262f;
      --bg4: #32323e;
      --border: #242430;
      --border-l: #30303e;
      --text: #ddd;
      --text2: #aaa;
      --text3: #777;
      --text4: #555;
      --accent: #60a5fa;
      --accent2: #3b82f6;
      --accent-d: #1a2e50;
      --green: #34d399;
      --green-d: #0a3020;
      --red: #f87171;
      --red-d: #3a0a0a;
      --yellow: #fbbf24;
      --yellow-d: #3a2a06;
      --purple: #c084fc;
      --purple-d: #2a1040;
      --sh: 0 1px 4px rgba(0, 0, 0, .35)
    }

    /* Графит */
    [data-theme="graphite"] {
      --bg: #141418;
      --bg1: #1a1a20;
      --bg2: #222228;
      --bg3: #2c2c34;
      --bg4: #383842;
      --border: #2a2a32;
      --border-l: #363640;
      --text: #e0e0e0;
      --text2: #b0b0b0;
      --text3: #808080;
      --text4: #5a5a5a;
      --accent: #f97316;
      --accent2: #ea580c;
      --accent-d: #3a1a08;
      --green: #22c55e;
      --green-d: #143020;
      --red: #ef4444;
      --red-d: #3a0a0a;
      --yellow: #eab308;
      --yellow-d: #352008;
      --purple: #a855f7;
      --purple-d: #2a1050;
      --sh: 0 1px 4px rgba(0, 0, 0, .35)
    }

    /* Лес */
    [data-theme="forest"] {
      --bg: #060d06;
      --bg1: #0a150a;
      --bg2: #111f11;
      --bg3: #1e351e;
      --bg4: #2a4a2a;
      --border: #1a3a1a;
      --border-l: #2a4a2a;
      --text: #d1fae5;
      --text2: #86efac;
      --text3: #4ade80;
      --text4: #22633a;
      --accent: #22c55e;
      --accent2: #16a34a;
      --accent-d: #052e16;
      --green: #4ade80;
      --green-d: #052e16;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #86efac;
      --purple-d: #052e16;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Роза */
    [data-theme="rose"] {
      --bg: #0d0608;
      --bg1: #15090d;
      --bg2: #1f1015;
      --bg3: #351a28;
      --bg4: #4a2438;
      --border: #3a1a28;
      --border-l: #4a2a38;
      --text: #fce7f3;
      --text2: #f9a8d4;
      --text3: #ec4899;
      --text4: #7a2050;
      --accent: #f43f5e;
      --accent2: #e11d48;
      --accent-d: #4c0519;
      --green: #fb7185;
      --green-d: #4c0519;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #fda4af;
      --purple-d: #4c0519;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Закат */
    [data-theme="sunset"] {
      --bg: #0f0805;
      --bg1: #1a0f08;
      --bg2: #241710;
      --bg3: #3a2518;
      --bg4: #503520;
      --border: #3a2018;
      --border-l: #4a3028;
      --text: #fed7aa;
      --text2: #fdba74;
      --text3: #fb923c;
      --text4: #7c3006;
      --accent: #f97316;
      --accent2: #ea580c;
      --accent-d: #431407;
      --green: #fb923c;
      --green-d: #431407;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #fdba74;
      --purple-d: #431407;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Океан */
    [data-theme="ocean"] {
      --bg: #04100e;
      --bg1: #081a16;
      --bg2: #0e2420;
      --bg3: #18382e;
      --bg4: #224a3e;
      --border: #1a3a2e;
      --border-l: #2a4a3e;
      --text: #ccfbf1;
      --text2: #5eead4;
      --text3: #2dd4bf;
      --text4: #156a5a;
      --accent: #14b8a6;
      --accent2: #0d9488;
      --accent-d: #052e28;
      --green: #2dd4bf;
      --green-d: #052e28;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #5eead4;
      --purple-d: #052e28;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    /* Аметист */
    [data-theme="amethyst"] {
      --bg: #0c0812;
      --bg1: #120e1a;
      --bg2: #1a1424;
      --bg3: #281e38;
      --bg4: #362a4a;
      --border: #241a36;
      --border-l: #342a46;
      --text: #ede9fe;
      --text2: #c4b5fd;
      --text3: #a78bfa;
      --text4: #5a3d8a;
      --accent: #8b5cf6;
      --accent2: #7c3aed;
      --accent-d: #1e0a40;
      --green: #a78bfa;
      --green-d: #1e0a40;
      --red: #fca5a5;
      --red-d: #450a0a;
      --yellow: #fde047;
      --yellow-d: #422006;
      --purple: #c084fc;
      --purple-d: #2a1050;
      --sh: 0 1px 4px rgba(0, 0, 0, .4)
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background .3s, color .3s
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg4);
      border-radius: 3px
    }

    .layout {
      display: flex;
      height: 100vh
    }

    .lp {
      width: 240px;
      min-width: 160px;
      max-width: 400px;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: background .3s
    }

    .rp {
      width: 255px;
      min-width: 180px;
      max-width: 400px;
      background: var(--bg1);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .3s
    }

    .rz {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      transition: background .2s;
      flex-shrink: 0;
      z-index: 10
    }

    .rz:hover,
    .rz.act {
      background: var(--accent)
    }

    .lp-h {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .lp-h h2 {
      font-size: 14px;
      font-weight: 600
    }

    .cl {
      flex: 1;
      overflow-y: auto;
      padding: 4px
    }

    .ci {
      padding: 8px 10px;
      border-radius: var(--r);
      cursor: pointer;
      margin-bottom: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      border: 1px solid transparent;
      transition: all .12s
    }

    .ci:hover {
      background: var(--bg3)
    }

    .ci.act {
      background: var(--accent-d);
      border-color: var(--accent)
    }

    .ci-i {
      flex: 1;
      min-width: 0
    }

    .ci-n {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .ci-m {
      font-size: 9px;
      color: var(--text4);
      margin-top: 1px
    }

    .ci-a {
      display: flex;
      gap: 1px;
      opacity: 0;
      transition: opacity .12s
    }

    .ci:hover .ci-a {
      opacity: 1
    }

    .cib {
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 3px;
      border-radius: 3px
    }

    .cib:hover {
      color: var(--text)
    }

    .cib.dng:hover {
      color: var(--red)
    }

    .ctr {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .ch {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 42px;
      gap: 6px;
      transition: background .3s
    }

    .ch-l {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0
    }

    .bdg {
      font-size: 10px;
      color: var(--text3);
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px
    }

    .cnt {
      font-size: 10px;
      color: var(--text4)
    }

    .mob {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text3);
      padding: 3px 7px;
      cursor: pointer;
      font-size: 13px
    }

    .mob:hover {
      color: var(--text)
    }

    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text4);
      gap: 8px
    }

    .empty-i {
      font-size: 40px;
      opacity: .25
    }

    .empty-t {
      font-size: 13px
    }

    .m {
      border-radius: var(--rl);
      padding: 12px 14px;
      max-width: 88%;
      position: relative;
      animation: fi .2s;
      box-shadow: var(--sh)
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1
      }
    }

    .m-u {
      background: var(--accent-d);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      align-self: flex-end
    }

    .m-b {
      background: var(--bg1);
      border: 1px solid var(--border);
      align-self: flex-start
    }

    .m-e {
      background: var(--red-d);
      border: 1px solid color-mix(in srgb, var(--red) 20%, transparent);
      align-self: flex-start
    }

    .mt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 6px
    }

    .ml {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px
    }

    .m-u .ml {
      color: var(--accent)
    }

    .m-b .ml {
      color: var(--green)
    }

    .m-e .ml {
      color: var(--red)
    }

    .mmtag {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text4);
      font-size: 9px;
      margin-left: 4px
    }

    .mm {
      display: flex;
      align-items: center;
      gap: 3px
    }

    .mti {
      font-size: 9px;
      color: var(--text4)
    }

    .macts {
      display: flex;
      gap: 1px;
      opacity: 0;
      transition: opacity .12s
    }

    .m:hover .macts {
      opacity: 1
    }

    .ma {
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text4);
      font-size: 10px;
      padding: 2px 4px;
      cursor: pointer;
      transition: all .1s;
      line-height: 1
    }

    .ma:hover {
      color: var(--text2);
      border-color: var(--border);
      background: var(--bg3)
    }

    .ma.dng:hover {
      color: var(--red);
      background: var(--red-d)
    }

    .mtx {
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word
    }

    .m-e .etx {
      color: var(--red);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      opacity: .85
    }

    .m img.gi {
      max-width: 100%;
      border-radius: var(--r);
      border: 1px solid var(--border);
      margin-top: 6px;
      display: block;
      cursor: zoom-in;
      transition: border-color .15s
    }

    .m img.gi:hover {
      border-color: var(--accent)
    }

    .info {
      font-size: 9px;
      color: var(--text4);
      margin-top: 2px
    }

    .dlr {
      display: flex;
      gap: 3px;
      margin-top: 6px;
      flex-wrap: wrap
    }

    .rsn {
      background: var(--purple-d);
      border: 1px solid color-mix(in srgb, var(--purple) 20%, transparent);
      border-radius: 6px;
      padding: 7px 9px;
      margin-top: 6px
    }

    .rsn summary {
      color: var(--purple);
      font-size: 10px;
      cursor: pointer;
      font-weight: 500
    }

    .rsn .rtx {
      color: var(--text2);
      font-size: 10px;
      margin-top: 5px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      max-height: 180px;
      overflow-y: auto
    }

    .usg {
      font-size: 9px;
      color: var(--text4);
      margin-top: 4px
    }

    .rwb {
      margin-top: 5px
    }

    .rwb summary {
      color: var(--text4);
      font-size: 9px;
      cursor: pointer
    }

    .rwb .rw {
      font-size: 9px;
      color: var(--text4);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
      margin-top: 2px
    }

    .swn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 6px;
